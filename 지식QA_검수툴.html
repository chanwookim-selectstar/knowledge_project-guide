<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독파모2차 · 지식 QA 검수 툴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* === Tokens === */
:root {
  --bg: #f5f5f7;
  --bg-elev: #ffffff;
  --bg-sunken: #ececef;
  --bg-hover: #f0f0f3;
  --border: #e4e4e7;
  --border-strong: #d4d4d8;
  --text: #18181b;
  --text-dim: #52525b;
  --text-faint: #a1a1aa;
  --accent: oklch(0.55 0.16 265);
  --accent-hover: oklch(0.48 0.18 265);
  --accent-soft: oklch(0.95 0.04 265);
  --accent-text: oklch(0.38 0.18 265);
  --success: oklch(0.58 0.14 150);
  --success-soft: oklch(0.94 0.06 150);
  --warning: oklch(0.68 0.14 75);
  --warning-soft: oklch(0.95 0.07 75);
  --danger: oklch(0.58 0.20 25);
  --danger-soft: oklch(0.94 0.05 25);
  --info: oklch(0.60 0.13 230);
  --info-soft: oklch(0.94 0.04 230);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --font-sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'D2Coding', Menlo, monospace;
  --body-size: 14px;
  --source-size: 15.5px;
}
[data-theme="dark"] {
  --bg: #0a0a0c;
  --bg-elev: #141417;
  --bg-sunken: #050507;
  --bg-hover: #1c1c20;
  --border: #26262b;
  --border-strong: #3a3a42;
  --text: #f4f4f5;
  --text-dim: #a1a1aa;
  --text-faint: #71717a;
  --accent: oklch(0.72 0.16 265);
  --accent-hover: oklch(0.78 0.18 265);
  --accent-soft: oklch(0.28 0.10 265);
  --accent-text: oklch(0.85 0.15 265);
  --success-soft: oklch(0.28 0.08 150);
  --warning-soft: oklch(0.30 0.08 75);
  --danger-soft: oklch(0.30 0.10 25);
  --info-soft: oklch(0.28 0.08 230);
}
[data-density="compact"] { --body-size: 13px; --source-size: 14px; }
[data-density="comfortable"] { --body-size: 15px; --source-size: 17px; }

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: var(--body-size);
  letter-spacing: -0.01em;
}
#root { height: 100vh; display: flex; flex-direction: column; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent-soft); color: var(--accent-text); }

/* === Top Bar === */
.topbar {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 14px;
  padding-right: 16px;
  border-right: 1px solid var(--border);
  height: 100%;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-brand-logo {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), oklch(0.55 0.18 305));
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 13px;
}
.topbar-brand-text { display: flex; flex-direction: column; gap: 1px; line-height: 1; }
.topbar-brand-text small { font-size: 10.5px; color: var(--text-faint); font-weight: 500; letter-spacing: 0; }
.topbar-progress {
  flex: 1; display: flex; align-items: center; gap: 14px; max-width: 480px; min-width: 0;
}
.progress-track {
  flex: 1; height: 6px; background: var(--bg-sunken); border-radius: 99px; overflow: hidden; position: relative;
}
.progress-fill {
  position: absolute; inset: 0 auto 0 0;
  background: linear-gradient(90deg, var(--accent), oklch(0.65 0.16 220));
  border-radius: 99px; transition: width .3s ease;
}
.progress-label {
  font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums;
  min-width: 80px; white-space: nowrap; flex-shrink: 0;
}
.progress-label strong { color: var(--text); font-weight: 600; }
.topbar-spacer { flex: 1; }
.topbar-stats {
  display: flex; align-items: center;
  background: var(--bg-sunken); border-radius: 8px; padding: 4px; flex-shrink: 0;
}
.topbar-stat {
  display: flex; flex-direction: column; gap: 1px;
  padding: 4px 10px; font-size: 11px; color: var(--text-dim);
  position: relative; line-height: 1.2; white-space: nowrap;
}
.topbar-stat + .topbar-stat::before {
  content: ""; position: absolute; left: 0; top: 25%; bottom: 25%;
  width: 1px; background: var(--border-strong);
}
.topbar-stat strong { font-size: 13px; color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
.topbar-actions { display: flex; gap: 4px; align-items: center; }
.iconbtn {
  width: 34px; height: 34px; display: grid; place-items: center;
  border: none; background: transparent; border-radius: 8px;
  color: var(--text-dim); transition: background .15s, color .15s;
}
.iconbtn:hover { background: var(--bg-hover); color: var(--text); }
.iconbtn.active { background: var(--accent-soft); color: var(--accent-text); }
.iconbtn svg { width: 18px; height: 18px; }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, oklch(0.65 0.13 30), oklch(0.55 0.16 350));
  color: white; display: grid; place-items: center;
  font-size: 12px; font-weight: 600; margin-left: 6px;
}

/* === Body Layout === */
.app-body { flex: 1; display: flex; overflow: hidden; }

/* === Sidebar === */
.sidebar {
  width: 268px; flex-shrink: 0;
  background: var(--bg-elev); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width .2s ease;
}
.sidebar.collapsed { width: 56px; }
.sidebar.collapsed .sidebar-search,
.sidebar.collapsed .sidebar-filters { display: none; }
.sidebar.collapsed .task-item { padding: 8px; justify-content: center; }
.sidebar.collapsed .task-item-body { display: none; }
.sidebar.collapsed .task-item-status { margin: 0; }
.sidebar-header {
  padding: 12px 14px 8px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.sidebar-title { font-size: 13px; font-weight: 700; }
.sidebar-count {
  background: var(--bg-sunken); color: var(--text-dim);
  padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 600;
}
.sidebar-search { padding: 0 12px 8px; }
.search-input {
  width: 100%; height: 32px; background: var(--bg-sunken);
  border: 1px solid transparent; border-radius: 8px;
  padding: 0 10px 0 30px; font-size: 12.5px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color .15s, background .15s;
}
.search-input:focus { border-color: var(--accent); background: var(--bg-elev); }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-faint); }
.sidebar-filters {
  display: flex; gap: 4px; padding: 0 12px 10px;
  overflow-x: auto; scrollbar-width: none;
}
.sidebar-filters::-webkit-scrollbar { display: none; }
.chip {
  padding: 4px 10px; border-radius: 99px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 11.5px; font-weight: 500; white-space: nowrap;
  transition: all .15s;
}
.chip:hover { background: var(--bg-hover); color: var(--text); }
.chip.active { background: var(--text); color: var(--bg-elev); border-color: var(--text); }
.task-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
.task-item {
  display: flex; gap: 10px; padding: 10px;
  border-radius: 8px; cursor: pointer; position: relative;
  margin-bottom: 1px; transition: background .12s;
}
.task-item:hover { background: var(--bg-hover); }
.task-item.active { background: var(--accent-soft); }
.task-item.active .task-item-title { color: var(--accent-text); font-weight: 600; }
.task-item-status {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-top: 7px; background: var(--text-faint);
}
.task-item-status.pending { background: var(--text-faint); }
.task-item-status.in-progress {
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 25%, transparent);
}
.task-item-status.completed { background: var(--success); opacity: 0.5; }
.task-item-status.completed.pass { background: var(--success); opacity: 1; }
.task-item-status.completed.fail { background: var(--danger); opacity: 1; }
.task-item-status.completed.modified { background: var(--info); opacity: 1; }
.task-item-status.completed.hold { background: var(--warning); opacity: 1; }
.task-item-body { flex: 1; min-width: 0; }
.task-item-q-prefix {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  color: var(--text-faint); letter-spacing: 0.04em; margin-bottom: 2px;
}
.task-item.active .task-item-q-prefix { color: var(--accent-text); }
.task-item-question {
  font-size: 12.5px; font-weight: 500; color: var(--text-dim); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.task-item.active .task-item-question { color: var(--accent-text); font-weight: 600; }
.task-group { margin: 2px 0 6px; }
.task-group-head {
  width: 100%; display: flex; align-items: center; gap: 6px; padding: 6px 8px;
  background: transparent; border: none; color: var(--text-dim);
  font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer;
  font-family: inherit; transition: background .12s;
}
.task-group-head:hover { background: var(--bg-hover); color: var(--text); }
.task-group-head.has-active { color: var(--text); }
.task-group-head svg { flex-shrink: 0; color: var(--text-faint); }
.task-group-title {
  flex: 1; text-align: left; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em;
}
.task-group-count {
  font-size: 10.5px; font-weight: 600; color: var(--text-faint);
  background: var(--bg-sunken); padding: 1px 6px; border-radius: 99px;
}
.task-group-body {
  display: flex; flex-direction: column;
  padding-left: 6px; border-left: 1px dashed var(--border);
  margin-left: 14px; margin-top: 2px;
}
.sidebar-footer {
  padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
}

/* === Workspace === */
.workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.workspace-header {
  flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-elev); display: flex; align-items: center; gap: 14px;
  min-width: 0; overflow: hidden;
}
.task-id {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);
  background: var(--bg-sunken); padding: 3px 7px; border-radius: 5px; white-space: nowrap; flex-shrink: 0;
}
.task-title-h { font-size: 16px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.task-category-pill {
  font-size: 11px; color: var(--text-dim); background: var(--bg-sunken);
  padding: 3px 9px; border-radius: 99px; font-weight: 500; white-space: nowrap; flex-shrink: 0;
}
.workspace-header-actions { margin-left: auto; display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.autosave-indicator {
  display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-faint);
  margin-right: 8px; white-space: nowrap; flex-shrink: 0;
}
.dot-pulse {
  width: 6px; height: 6px; border-radius: 50%; background: var(--success);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--success) 50%, transparent); }
  70% { box-shadow: 0 0 0 6px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

/* === Dual Pane === */
.dual-pane {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  overflow: hidden; position: relative;
}
.dual-pane::before {
  content: ""; position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; background: var(--border); transform: translateX(-0.5px); z-index: 1;
}
.pane { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.pane-header {
  flex-shrink: 0; padding: 10px 18px; display: flex; align-items: center; gap: 10px;
  background: var(--bg); border-bottom: 1px solid var(--border); min-height: 44px; min-width: 0; overflow: hidden;
}
.pane-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-faint); white-space: nowrap; flex-shrink: 0;
}
.pane-source-url {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
  min-width: 0; flex: 0 1 auto; overflow: hidden; text-overflow: ellipsis;
}
.pane-source-url svg { flex-shrink: 0; width: 11px; height: 11px; }
.pane-header-spacer { flex: 1; }
.pane-search {
  width: 220px; max-width: 220px; flex: 0 1 220px; min-width: 100px;
  height: 28px; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 6px; padding: 0 8px 0 26px; font-size: 12px;
  font-family: inherit; color: var(--text); outline: none;
}
.pane-search:focus { border-color: var(--accent); }
.pane-search-wrap { position: relative; }
.pane-search-wrap svg { position: absolute; left: 7px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--text-faint); }
.pane-content { flex: 1; overflow-y: auto; padding: 24px 28px 80px; }
.source-text {
  font-size: var(--source-size); line-height: 1.85; color: var(--text);
  user-select: text; -webkit-user-select: text; letter-spacing: -0.005em; max-width: 720px;
}
.source-text p { margin: 0 0 18px; }
.search-mark {
  background: oklch(0.95 0.12 90); color: oklch(0.30 0.13 90); border-radius: 2px; padding: 1px 0;
}
[data-theme="dark"] .search-mark { background: oklch(0.45 0.15 90); color: oklch(0.95 0.05 90); }

/* === QA Pane === */
.qa-single {
  display: flex; flex-direction: column; gap: 0;
  max-width: 680px; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px 32px; box-shadow: var(--shadow-sm);
}
.qa-section { display: flex; flex-direction: column; }
.qa-section-header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.qa-section-label {
  display: flex; align-items: center; gap: 9px;
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--text-faint); text-transform: uppercase;
}
.qa-section-tag {
  width: 22px; height: 22px; border-radius: 7px;
  display: grid; place-items: center; font-size: 12px; font-weight: 700;
  font-family: var(--font-mono); color: white;
}
.qa-section-tag.q { background: var(--text); }
.qa-section-tag.a { background: var(--accent); }
.qa-meta-chip {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
  border-radius: 99px; background: var(--bg-sunken); color: var(--text-dim);
  font-size: 11px; font-weight: 500;
}
.qa-meta-chip.ok { background: var(--success-soft); color: var(--success); font-weight: 600; }
.qa-meta-chip.warn { background: var(--warning-soft); color: var(--warning); font-weight: 600; }
[data-theme="dark"] .qa-meta-chip.ok { color: oklch(0.85 0.12 150); }
[data-theme="dark"] .qa-meta-chip.warn { color: oklch(0.85 0.12 75); }
.qa-question-big {
  font-size: 18px; font-weight: 600; line-height: 1.55; color: var(--text); letter-spacing: -0.015em;
}
.qa-divider { display: flex; align-items: center; gap: 10px; margin: 22px 0; color: var(--text-faint); }
.qa-divider-line { flex: 1; height: 1px; background: var(--border); }
.qa-divider svg { transform: rotate(90deg); opacity: 0.6; }
.qa-answer-big {
  display: block; font-size: 16px; line-height: 1.8; color: var(--text);
  letter-spacing: -0.005em; user-select: text; -webkit-user-select: text;
}
.qa-instructions {
  display: flex; align-items: flex-start; gap: 6px; margin-top: 18px;
  padding: 10px 12px; background: var(--bg); border-radius: 8px;
  font-size: 12px; line-height: 1.55; color: var(--text-dim);
}
.qa-instructions svg { flex-shrink: 0; margin-top: 2px; color: var(--text-faint); }
.qa-instructions strong { color: var(--text); font-weight: 600; }
.qa-meta-row {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 18px; margin-bottom: 22px;
  border-bottom: 1px dashed var(--border);
}
.qa-meta-row-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-faint); flex-shrink: 0;
}
.qa-meta-row-spacer { flex: 1; }
.qa-id-chip {
  font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint);
  background: var(--bg-sunken); padding: 3px 8px; border-radius: 5px;
  letter-spacing: 0.02em; white-space: nowrap; flex-shrink: 0;
}

/* === Category Editor === */
.category-editor { position: relative; }
.category-editor-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 10px 5px 8px; border-radius: 7px;
  background: var(--bg-sunken); border: 1px solid transparent;
  color: var(--text); font-family: inherit; font-size: 12.5px; font-weight: 600;
  transition: all .12s; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.category-editor-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
.category-editor-btn.changed { background: var(--warning-soft); color: oklch(0.40 0.14 75); }
[data-theme="dark"] .category-editor-btn.changed { color: oklch(0.90 0.12 75); }
.category-editor-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.category-editor-label { flex: 1; }
.category-editor-changed {
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  background: oklch(0.70 0.18 30); color: white; border-radius: 99px;
  margin-left: 2px; letter-spacing: 0.02em;
}
.category-editor-menu {
  position: absolute; top: calc(100% + 4px); left: 0; min-width: 200px;
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px;
  box-shadow: var(--shadow-md); padding: 6px; z-index: 30;
  animation: fadein .12s;
}
.category-editor-menu-head {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-faint);
  text-transform: uppercase; padding: 6px 8px 4px;
}
.category-editor-option {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 7px 8px; border: none; background: transparent; color: var(--text);
  font-family: inherit; font-size: 13px; border-radius: 6px; cursor: pointer; text-align: left;
}
.category-editor-option:hover { background: var(--bg-hover); }
.category-editor-option.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 600; }
.category-editor-orig {
  font-size: 10px; color: var(--text-faint); background: var(--bg-sunken);
  padding: 1px 5px; border-radius: 99px; margin-left: auto;
}
.category-editor-option svg { margin-left: auto; color: var(--accent-text); }

/* === Highlight === */
.hl-segment { position: relative; border-radius: 2px; padding: 1px 0; transition: background-color .12s; cursor: pointer; }
.hl-segment.has-bg { padding: 2px 1px; }
.hl-segment .hl-stack {
  position: absolute; left: 0; right: 0; bottom: -2px;
  display: flex; flex-direction: column-reverse; gap: 1.5px; pointer-events: none;
}
.hl-stack-bar { height: 2.5px; border-radius: 99px; }
.hl-segment.active-link { outline: 1.5px dashed currentColor; outline-offset: 1px; }

/* === Mappings Bar === */
.mappings-bar {
  flex-shrink: 0; background: var(--bg-elev); border-top: 1px solid var(--border);
  padding: 8px 18px; display: flex; align-items: center; gap: 8px;
  overflow-x: auto; min-height: 44px; scrollbar-width: none;
}
.mappings-bar::-webkit-scrollbar { display: none; }
.mappings-bar-label { font-size: 11px; font-weight: 600; color: var(--text-faint); letter-spacing: 0.04em; flex-shrink: 0; margin-right: 4px; }
.mapping-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 4px 4px 10px; border-radius: 99px; font-size: 11.5px; font-weight: 500;
  white-space: nowrap; flex-shrink: 0; border: 1px solid; cursor: pointer; transition: transform .12s;
}
.mapping-pill:hover { transform: translateY(-1px); }
.mapping-pill.active { box-shadow: 0 0 0 2px var(--text); }
.mapping-pill .pill-num { font-family: var(--font-mono); font-weight: 700; font-size: 10.5px; }
.mapping-pill .pill-count {
  background: rgba(0,0,0,0.08); border-radius: 99px; padding: 1px 6px; font-size: 10px;
}
[data-theme="dark"] .mapping-pill .pill-count { background: rgba(255,255,255,0.12); }
.mapping-pill .pill-x {
  width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center;
  background: rgba(0,0,0,0.08); border: none; color: inherit; padding: 0; font-size: 10px; font-weight: 700;
}
[data-theme="dark"] .mapping-pill .pill-x { background: rgba(255,255,255,0.15); }
.mapping-pill .pill-x:hover { background: rgba(0,0,0,0.18); }
.new-mapping-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 99px; background: var(--bg-sunken);
  border: 1px dashed var(--border-strong); color: var(--text-dim); font-size: 11.5px; font-weight: 500; flex-shrink: 0;
}
.new-mapping-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--accent); }
.new-mapping-btn.active { background: var(--accent); border-style: solid; border-color: var(--accent); color: white; }
.new-mapping-btn svg { width: 12px; height: 12px; }
.mappings-bar-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.ai-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 99px; background: var(--bg-sunken);
  border: 1px solid var(--border); color: var(--text-dim); font-family: inherit;
  font-size: 11.5px; font-weight: 600; flex-shrink: 0; transition: all .12s;
}
.ai-toggle:hover { color: var(--text); border-color: var(--border-strong); }
.ai-toggle.on {
  background: oklch(0.96 0.05 245); border-color: oklch(0.62 0.16 245); color: oklch(0.40 0.16 245);
}
[data-theme="dark"] .ai-toggle.on {
  background: oklch(0.28 0.08 245); border-color: oklch(0.50 0.14 245); color: oklch(0.85 0.10 245);
}
.suggestion-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 4px 4px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 500;
  border: 1.5px dashed; background: transparent; white-space: nowrap; flex-shrink: 0;
}
.suggestion-pill .pill-num { font-family: var(--font-mono); font-weight: 700; font-size: 10px; letter-spacing: 0.04em; }
.suggestion-pill .pill-count { background: transparent; border: 1px solid currentColor; opacity: 0.6; padding: 0 6px; font-size: 10px; }
.suggestion-pill .pill-confidence { font-family: var(--font-mono); font-size: 10px; font-weight: 600; opacity: 0.7; }
.pill-accept {
  width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center;
  background: var(--success); border: none; color: white; padding: 0; cursor: pointer;
}
.pill-accept:hover { background: oklch(0.50 0.16 150); }

/* === Mapping Floater === */
.mapping-floater {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg-elev);
  padding: 8px 8px 8px 16px; border-radius: 99px;
  display: flex; align-items: center; gap: 10px;
  font-size: 12.5px; box-shadow: var(--shadow-lg); z-index: 5; font-weight: 500;
}
.mapping-floater .floater-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 0 2px var(--text); }
.mapping-floater button {
  background: rgba(255,255,255,0.12); border: none; color: inherit; font: inherit;
  padding: 4px 10px; border-radius: 99px; display: flex; align-items: center; gap: 4px;
}
.mapping-floater button:hover { background: rgba(255,255,255,0.22); }
.mapping-floater button.primary { background: var(--accent); color: white; }
.mapping-floater button.primary:hover { background: var(--accent-hover); }

/* === Review Footer === */
.review-footer { flex-shrink: 0; background: var(--bg-elev); border-top: 1px solid var(--border); box-shadow: 0 -4px 16px rgba(0,0,0,0.04); }
.review-footer-main { display: flex; align-items: center; gap: 12px; padding: 12px 20px; }
.review-status-group {
  display: flex; gap: 6px; padding: 4px;
  background: var(--bg-sunken); border-radius: 10px; flex-shrink: 0;
}
.review-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 7px; background: transparent; border: none;
  color: var(--text-dim); font-size: 13px; font-weight: 500; font-family: inherit;
  transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
.review-btn:hover { color: var(--text); background: var(--bg-elev); }
.review-btn.active { background: var(--bg-elev); box-shadow: var(--shadow-sm); color: var(--text); font-weight: 600; }
.review-btn .review-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); }
.review-btn .review-key { margin-left: 4px; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); background: var(--bg); padding: 1px 5px; border-radius: 3px; }
.review-btn.active.pass { color: var(--success); }
.review-btn.active.pass .review-dot { background: var(--success); }
.review-btn.active.fail { color: var(--danger); }
.review-btn.active.fail .review-dot { background: var(--danger); }
.review-btn.active.modified { color: var(--info); }
.review-btn.active.modified .review-dot { background: var(--info); }
.review-btn.active.hold { color: var(--warning); }
.review-btn.active.hold .review-dot { background: var(--warning); }
.review-spacer { flex: 1; }
.review-hint { font-size: 12px; color: var(--text-faint); display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; }
.btn-primary, .btn-secondary {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
  border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600;
  border: none; transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-primary { background: var(--text); color: var(--bg-elev); }
.btn-primary:hover { background: color-mix(in oklch, var(--text) 85%, var(--accent)); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary kbd { font-family: var(--font-mono); font-size: 10px; background: rgba(255,255,255,0.15); padding: 1px 5px; border-radius: 3px; }
[data-theme="dark"] .btn-primary kbd { background: rgba(0,0,0,0.25); }
.btn-secondary { background: var(--bg-sunken); color: var(--text); }
.btn-secondary:hover { background: var(--bg-hover); }
.review-detail {
  border-top: 1px solid var(--border); padding: 16px 20px;
  display: grid; grid-template-columns: 1fr 1.4fr; gap: 20px; background: var(--bg);
}
.review-detail-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-faint);
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.review-detail-label .required { color: var(--danger); font-size: 10px; }
.category-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.category-chip {
  padding: 6px 11px; border-radius: 7px; background: var(--bg-elev); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 12.5px; font-weight: 500; font-family: inherit;
}
.category-chip:hover { border-color: var(--text-dim); color: var(--text); }
.category-chip.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-text); font-weight: 600; }
.reason-textarea {
  width: 100%; min-height: 76px; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; font-family: inherit; font-size: 13px;
  color: var(--text); resize: vertical; outline: none; line-height: 1.5;
}
.reason-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 10%, transparent); }
.reason-textarea::placeholder { color: var(--text-faint); }
.reason-meta { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--text-faint); }

/* === Modal === */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(10,10,12,0.4); z-index: 50;
  display: grid; place-items: center; backdrop-filter: blur(2px); animation: fadein .15s;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-elev); border-radius: var(--radius-lg); border: 1px solid var(--border);
  box-shadow: var(--shadow-lg); width: 480px; max-height: 80vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
.modal-head h3 { margin: 0; font-size: 14px; font-weight: 700; flex: 1; }
.modal-body { padding: 8px 20px 20px; overflow-y: auto; }
.shortcut-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.shortcut-row:last-child { border-bottom: none; }
.shortcut-keys { display: flex; gap: 4px; }
.shortcut-keys kbd {
  font-family: var(--font-mono); font-size: 11px; background: var(--bg-sunken);
  border: 1px solid var(--border); border-bottom-width: 2px; padding: 2px 7px;
  border-radius: 5px; color: var(--text); min-width: 22px; text-align: center;
}

/* === Toast === */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg-elev);
  padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 100; display: flex; align-items: center; gap: 10px;
  animation: slideup .25s;
}
@keyframes slideup { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.toast svg { width: 16px; height: 16px; color: var(--success); }
@keyframes spin { to { transform: rotate(360deg); } }

/* flag active */
.iconbtn.flagged { color: oklch(0.68 0.18 30); background: oklch(0.94 0.06 30); }
[data-theme="dark"] .iconbtn.flagged { background: oklch(0.32 0.10 30); }
/* error-span highlight (fail mode drag) */
.hl-segment.error-span { background: color-mix(in oklch, var(--danger) 18%, transparent) !important; border-bottom: 2px solid var(--danger) !important; }
.hl-segment.active-suggestion { outline: 2px solid currentColor; outline-offset: 1px; border-radius: 2px; }

/* submit-blocker hint */
.submit-block-hint { font-size: 11.5px; color: var(--warning); display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--warning-soft); border: 1px solid color-mix(in oklch, var(--warning) 30%, transparent); border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
/* session-restore */
.restore-modal { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 460px; padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
.restore-modal h3 { margin: 0; font-size: 15px; font-weight: 700; }
.restore-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
.restore-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: var(--bg-sunken); font-size: 12.5px; }
.restore-row-id { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); flex-shrink: 0; }
.rv-pass { background: var(--success-soft); color: var(--success); padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.rv-fail { background: var(--danger-soft); color: var(--danger); padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.rv-modified { background: var(--info-soft); color: var(--info); padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.rv-hold { background: var(--warning-soft); color: var(--warning); padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }



/* === Deidentification Floating Panel === */
.deid-float {
  position: absolute;
  top: 12px; left: 12px;
  width: 340px;
  background: var(--bg-elev);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.12);
  display: flex; flex-direction: column;
  z-index: 20;
  overflow: hidden;
  animation: fadein .15s;
  max-height: calc(100% - 24px);
}
.deid-modal {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
  width: 340px; display: flex; flex-direction: column;
  overflow: hidden;
}
.deid-header {
  padding: 12px 16px 10px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px; flex-shrink: 0;
  cursor: grab; user-select: none;
}
.deid-header:active { cursor: grabbing; }
.deid-header-icon {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--warning-soft); display: grid; place-items: center;
  font-size: 14px;
}
.deid-header-text h3 { margin: 0 0 2px; font-size: 13px; font-weight: 700; }
.deid-header-text p  { margin: 0; font-size: 11px; color: var(--text-dim); line-height: 1.4; }
.deid-drag-hint { font-size: 10px; color: var(--text-faint); margin-left: auto; flex-shrink: 0; align-self: flex-start; padding-top: 2px; }
.deid-body { padding: 12px 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.deid-body::-webkit-scrollbar { width: 4px; }
.deid-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

/* Step 1 — 객체 유형 카드 */
.deid-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.deid-type-card {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 11px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--bg-sunken);
  cursor: pointer; transition: all .15s; user-select: none;
}
.deid-type-card:hover { border-color: var(--border-strong); background: var(--bg-hover); }
.deid-type-card.selected { border-color: var(--accent); background: var(--accent-soft); }
.deid-type-card.none-card { grid-column: 1 / -1; }
.deid-type-card.none-card.selected { border-color: var(--success); background: var(--success-soft); }
.deid-type-emoji { font-size: 20px; flex-shrink: 0; }
.deid-type-label { font-size: 13px; font-weight: 600; color: var(--text); }
.deid-type-sub   { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
.deid-type-check {
  margin-left: auto; width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border-strong); background: var(--bg-elev);
  display: grid; place-items: center; flex-shrink: 0; font-size: 10px;
  transition: all .15s;
}
.deid-type-card.selected .deid-type-check {
  background: var(--accent); border-color: var(--accent); color: white;
}
.deid-type-card.none-card.selected .deid-type-check {
  background: var(--success); border-color: var(--success); color: white;
}

/* Step 2 — 세부 질문 */
.deid-section { display: flex; flex-direction: column; gap: 10px; }
.deid-section-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 700; color: var(--text-dim);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.deid-question {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: var(--bg-sunken); border: 1px solid var(--border);
  transition: border-color .12s;
}
.deid-question.flagged-yes { border-color: var(--danger); background: var(--danger-soft); }
.deid-question-text { font-size: 12px; color: var(--text); line-height: 1.45; flex: 1; }
.deid-question-text small { display: block; font-size: 10px; color: var(--text-faint); margin-top: 1px; }
.deid-btns { display: flex; gap: 5px; flex-shrink: 0; }
.deid-btn {
  padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--bg-elev);
  color: var(--text-dim); cursor: pointer; transition: all .12s; font-family: inherit;
}
.deid-btn:hover { border-color: var(--border-strong); color: var(--text); }
.deid-btn.yes.active { border-color: var(--danger); background: var(--danger-soft); color: var(--danger); }
.deid-btn.no.active  { border-color: var(--success); background: var(--success-soft); color: var(--success); }

/* Result banner */
.deid-result {
  display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px;
  border-radius: 8px; font-size: 12px; line-height: 1.5;
  border: 1.5px solid; flex-shrink: 0;
}
.deid-result.warning {
  background: var(--danger-soft); border-color: color-mix(in oklch, var(--danger) 35%, transparent);
  color: var(--danger);
}
.deid-result.safe {
  background: var(--success-soft); border-color: color-mix(in oklch, var(--success) 35%, transparent);
  color: var(--success);
}
.deid-result-icon { font-size: 16px; flex-shrink: 0; }
.deid-result-body strong { display: block; font-size: 12.5px; font-weight: 700; margin-bottom: 2px; }

/* Footer */
.deid-footer {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  background: var(--bg); flex-wrap: wrap;
}
.deid-footer-hint { font-size: 11px; color: var(--text-faint); flex: 1; min-width: 100%; margin-bottom: 4px; }

/* TopBar toggle */
.deid-toggle {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 11px; border-radius: 7px; font-family: inherit;
  font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-sunken);
  color: var(--text-dim); transition: all .15s; flex-shrink: 0;
}
.deid-toggle:hover { border-color: var(--border-strong); color: var(--text); }
.deid-toggle.on {
  background: var(--warning-soft); border-color: color-mix(in oklch, var(--warning) 40%, transparent);
  color: oklch(0.50 0.15 75);
}
[data-theme="dark"] .deid-toggle.on { color: oklch(0.88 0.12 75); }
.deid-toggle-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint);
  transition: background .15s;
}
.deid-toggle.on .deid-toggle-dot { background: var(--warning); }

/* === Scrollbars === */
.pane-content::-webkit-scrollbar, .task-list::-webkit-scrollbar, .modal-body::-webkit-scrollbar { width: 10px; }
.pane-content::-webkit-scrollbar-thumb, .task-list::-webkit-scrollbar-thumb, .modal-body::-webkit-scrollbar-thumb {
  background: var(--border-strong); border-radius: 99px;
  border: 2px solid var(--bg-elev); background-clip: padding-box;
}
.pane-content::-webkit-scrollbar-track { background: transparent; }

/* === Session Setup Screen === */
.setup-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
.setup-card {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: 20px;
  box-shadow: var(--shadow-lg); width: 520px; padding: 40px 44px;
  display: flex; flex-direction: column; gap: 28px;
}
.setup-logo-row { display: flex; align-items: center; gap: 12px; }
.setup-logo {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, var(--accent), oklch(0.55 0.18 305));
  display: grid; place-items: center; color: white; font-weight: 800; font-size: 18px;
}
.setup-brand { display: flex; flex-direction: column; gap: 2px; line-height: 1; }
.setup-brand strong { font-size: 16px; font-weight: 700; }
.setup-brand small { font-size: 12px; color: var(--text-faint); }
.setup-divider { height: 1px; background: var(--border); margin: 0; }
.setup-section { display: flex; flex-direction: column; gap: 14px; }
.setup-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-faint);
}
.setup-field { display: flex; flex-direction: column; gap: 6px; }
.setup-field label { font-size: 13px; font-weight: 600; color: var(--text-dim); }
.setup-input {
  height: 40px; padding: 0 14px; border-radius: 9px;
  border: 1.5px solid var(--border); background: var(--bg-sunken);
  font-family: inherit; font-size: 14px; color: var(--text); outline: none;
  transition: border-color .15s, background .15s;
}
.setup-input:focus { border-color: var(--accent); background: var(--bg-elev); }
.setup-input::placeholder { color: var(--text-faint); }
.setup-file-btn {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  border-radius: 9px; border: 1.5px dashed var(--border-strong);
  background: var(--bg-sunken); cursor: pointer; transition: all .15s;
  font-family: inherit; font-size: 13px; color: var(--text-dim); text-align: left;
}
.setup-file-btn:hover { border-color: var(--accent); background: var(--bg-hover); color: var(--text); }
.setup-file-btn.selected { border-style: solid; border-color: var(--success); color: var(--success); background: var(--success-soft); }
.setup-file-btn svg { flex-shrink: 0; }
.setup-file-name { font-family: var(--font-mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.setup-file-count { font-size: 11px; opacity: 0.7; margin-left: auto; flex-shrink: 0; }
.setup-folder-row { display: flex; gap: 8px; align-items: stretch; }
.setup-folder-btn {
  flex: 1; display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  border-radius: 9px; border: 1.5px dashed var(--border-strong);
  background: var(--bg-sunken); cursor: pointer; transition: all .15s;

<script>
// ─── JSONL Parser ─────────────────────────────────────────────────────────────
// Expected JSONL schema per line:
// {
//   "id": "T-2024-0142",              // task ID
//   "article_id": "eiffel",           // groups QAs from same source
//   "title": "에펠탑",                 // article title
//   "category": "건축물",              // article category (for sidebar)
//   "source": {                        // source document
//     "url": "ko.wikipedia.org/...",
//     "revision": "2024-03-12 기준",
//     "paragraphs": ["문단1", "문단2", ...]
//   },
//   "qa": {
//     "id": "qa-1",
//     "category": "art",              // one of QA_CATEGORIES ids
//     "question": "질문",
//     "answer": "답변"
//   },
//   "suggestions": [                  // optional AI suggestions
//     { "id": "sg-1", "confidence": 0.94,
//       "source": [{"paragraphIdx":0,"start":53,"end":96}],
//       "answer": [{"start":0,"end":36}] }
//   ]
// }

function parseJsonl(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const tasks = [];
  const errors = [];

  // Map metadata.subcategory → QA_CATEGORIES id
  const CAT_MAP = {
    '역사': 'history', '경제': 'economy', '경영': 'economy', '경제/경영': 'economy',
    '건강': 'health', '의학': 'health', '건강/의학': 'health',
    '예술': 'art', '과학': 'science', '기술': 'science', '과학/기술': 'science',
  };
  const toCatId = (label) => {
    if (!label) return 'art';
    const norm = label.trim();
    if (CAT_MAP[norm]) return CAT_MAP[norm];
    // partial match
    for (const [k, v] of Object.entries(CAT_MAP)) { if (norm.includes(k)) return v; }
    return 'art';
  };

  // Extract a readable title from a Wikipedia URL
  const titleFromUrl = (url) => {
    if (!url) return '(제목 없음)';
    try {
      const decoded = decodeURIComponent(url.split('/wiki/').pop() || '');
      return decoded.replace(/_/g, ' ') || '(제목 없음)';
    } catch { return url; }
  };

  lines.forEach((line, i) => {
    try {
      const raw = JSON.parse(line);

      // ── pull question & answer from messages array ──────────────────────
      const msgs = raw.messages || [];
      const userMsg  = msgs.find(m => m.role === 'user');
      const assistMsg = msgs.find(m => m.role === 'assistant');

      const getTextValue = (msg) => {
        if (!msg) return '';
        const c = msg.content;
        if (typeof c === 'string') return c;
        if (Array.isArray(c)) {
          // content: [{type:'text', value:'...'}, ...]
          const t = c.find(x => x.type === 'text');
          return t?.value || t?.text || '';
        }
        return '';
      };

      const question = getTextValue(userMsg);
      const answer   = getTextValue(assistMsg);

      // ── metadata ────────────────────────────────────────────────────────
      const meta      = raw.metadata || {};
      const sourceUrl = meta.source || '';
      const subcat    = meta.subcategory || meta.category || '';
      const catId     = toCatId(subcat);
      const artTitle  = titleFromUrl(sourceUrl);
      // Use URL path as article grouping key (same article → same URL)
      const articleId = sourceUrl || raw.id || `article-${i}`;

      // ── existing review (pre-filled if _review present) ─────────────────
      const preReview = raw._review ? {
        status:   raw._review.verdict || null,  // pass/fail/…
        reason:   raw._review.memo    || '',
        category: null,
      } : null;

      // ── source pane: show URL + answer as readable content ──────────────
      // Real source text not embedded in the file → show placeholder paragraph
      // so the tool renders correctly. Worker can open the URL manually.
      const sourceDisplay = {
        url:      sourceUrl,
        revision: meta.version || '',
        paragraphs: [
          `※ 원천 데이터는 아래 URL에서 확인하세요:\n${sourceUrl}\n\n원천 텍스트를 이 창에 붙여넣으려면 도구 메뉴를 이용하세요.`,
        ],
      };

      tasks.push({
        id:            raw.id || `task-${i}`,
        articleId,
        title:         artTitle,
        category:      subcat,        // display label in sidebar
        status:        preReview?.status === 'pass' ? 'completed' : 'pending',
        questionShort: question.slice(0, 60),
        source:        sourceDisplay,
        qa: {
          id:               `${raw.id || `task-${i}`}-qa`,
          category:         catId,
          originalCategory: catId,
          question,
          answer,
        },
        suggestions: [],
        mappings:    [],
        review:      preReview,
        // raw preserved for export
        _raw: raw,
      });
    } catch (e) {
      errors.push({ line: i + 1, error: e.message });
    }
  });

  return { tasks, errors };
}

// ─── File System Access API helpers ───────────────────────────────────────────
async function pickOutputFolder() {
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'downloads' });
    return handle;
  } catch (e) {
    if (e.name === 'AbortError') return null;
    throw e;
  }
}

async function saveResultFile(folderHandle, filename, data) {
  const fileHandle = await folderHandle.getFileHandle(filename, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify(data, null, 2));
  await writable.close();
}

function buildOutputFilename(workerId, taskId) {
  const safeWorker = workerId.replace(/[^a-zA-Z0-9가-힣_-]/g, '_');
  const safeTask   = taskId.replace(/[^a-zA-Z0-9_-]/g, '_');
  return `${safeWorker}_${safeTask}.json`;
}

function buildResultPayload({ task, workerId, review, mappings }) {
  const toKST = (d) => {
    const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return kst.toISOString().replace('Z', '+09:00');
  };
  const nowDate    = new Date();
  const now        = toKST(nowDate);

  // 최초 제출 로그 보존: 이미 저장된 로그가 있으면 시간값 그대로 유지
  const firstLog = task._firstLog;
  const assignedAt    = firstLog ? firstLog.assigned_at    : (task.assignedAt ? toKST(new Date(task.assignedAt)) : now);
  const submittedAt   = firstLog ? firstLog.submitted_at   : now;
  const elapsedSeconds = firstLog ? firstLog.elapsed_seconds
    : Math.max(0, Math.round((nowDate - new Date(task.assignedAt || nowDate)) / 1000));

  const catLabel   = (id) => QA_CATEGORIES.find(c => c.id === id)?.label || id;
  const catChanged = task.qa.category !== task.qa.originalCategory;

  // Preserve original input structure (result_metadata 제외)
  const base = task._raw ? (() => {
    const b = JSON.parse(JSON.stringify(task._raw));
    delete b.result_metadata;
    return b;
  })() : {
    id: task.id, messages: [],
    metadata: { category: '지식', subcategory: catLabel(task.qa.originalCategory) },
  };

  // Apply changed category (Korean label) to metadata
  if (catChanged && base.metadata) base.metadata.subcategory = catLabel(task.qa.category);

  base._review = {
    schema_version:  "1.1",
    worker_id:       workerId,
    assigned_at:     assignedAt,
    submitted_at:    submittedAt,
    elapsed_seconds: elapsedSeconds,
    verdict:         review.status,
    error_category:  review.category || null,
    reason:          review.reason   || null,
    flag:            !!task.flagged,
    ...(catChanged ? {
      category_changed:     true,
      original_subcategory: catLabel(task.qa.originalCategory),
    } : { category_changed: false }),
    mappings: mappings.map((m, idx) => ({
      index: idx + 1,
      source_spans: (m.source || []).map(s => ({
        paragraph_index: s.paragraphIdx, start: s.start, end: s.end,
        text: (task.source?.paragraphs?.[s.paragraphIdx] || '').slice(s.start, s.end),
      })),
      answer_spans: (m.answer || []).map(a => ({
        start: a.start, end: a.end,
        text: task.qa.answer.slice(a.start, a.end),
      })),
      from_suggestion: m.fromSuggestion || null,
    })),
    error_spans: (review.errorSpans || []).map(s => ({
      start: s.start, end: s.end,
      text: task.qa.answer.slice(s.start, s.end),
    })),

  };
  return base;
}

// ─── HighlightedText ──────────────────────────────────────────────────────────
function HighlightedText({ text, ranges, onSegmentClick, onSelect, theme, className, errorSpanMode }) {
  const containerRef = useRef(null);

  const segments = useMemo(() => {
    const boundaries = new Set([0, text.length]);
    for (const r of ranges) {
      boundaries.add(Math.max(0, r.start));
      boundaries.add(Math.min(text.length, r.end));
    }
    const sorted = [...boundaries].sort((a, b) => a - b);
    const segs = [];
    for (let i = 0; i < sorted.length - 1; i++) {
      const s = sorted[i], e = sorted[i + 1];
      if (s >= e) continue;
      const covering = ranges.filter(r => r.start <= s && r.end >= e);
      segs.push({ start: s, end: e, text: text.slice(s, e), ranges: covering });
    }
    return segs;
  }, [text, ranges]);

  const handleMouseUp = useCallback((e) => {
    // Read selection immediately (before any timeout that might clear it)
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    if (!containerRef.current) return;
    if (!containerRef.current.contains(sel.anchorNode) || !containerRef.current.contains(sel.focusNode)) return;

    const getOffset = (node, offset) => {
      let el = node;
      if (el.nodeType === 3) el = el.parentElement;
      while (el && el !== containerRef.current) {
        if (el.dataset && el.dataset.segStart !== undefined) break;
        el = el.parentElement;
      }
      if (!el || el === containerRef.current || el.dataset?.segStart === undefined) return null;
      return parseInt(el.dataset.segStart, 10) + offset;
    };

    const a = getOffset(sel.anchorNode, sel.anchorOffset);
    const b = getOffset(sel.focusNode, sel.focusOffset);
    if (a == null || b == null) return;
    const start = Math.min(a, b), end = Math.max(a, b);
    if (end - start < 1) return;

    sel.removeAllRanges(); // clear before calling onSelect to prevent double trigger
    onSelect && onSelect({ start, end });
  }, [onSelect]);

  const handleClick = (e) => {
    if (errorSpanMode) return; // error span mode: clicks don't navigate mappings
    const target = e.target.closest('[data-mapping-id]');
    if (target && onSegmentClick) {
      const sel = window.getSelection();
      if (sel && !sel.isCollapsed) return;
      onSegmentClick(target.dataset.mappingId);
    }
  };

  const isBlock = className && className.includes('qa-answer');

  return React.createElement('span', {
    ref: containerRef, className,
    style: { display: isBlock ? 'block' : 'inline', cursor: errorSpanMode ? 'text' : undefined },
    onMouseUp: handleMouseUp, onClick: handleClick,
  }, segments.map((seg, i) => {
    const hasError = seg.ranges.some(r => r.isErrorSpan);
    const confirmedRanges = seg.ranges.filter(r => !r.suggested && !r.isErrorSpan);
    const suggestedRanges = seg.ranges.filter(r => r.suggested);
    const hasConfirmed = confirmedRanges.length > 0;
    const hasSuggested = suggestedRanges.length > 0;
    const isSuggestOnly = !hasConfirmed && hasSuggested;
    const active = seg.ranges.find(r => r.isActive && !r.isErrorSpan);
    const topRange = active || confirmedRanges[0] || suggestedRanges[0]; // may be undefined for error-only

    // Safe color lookup — guard against missing topRange
    const safeColor = (fn) => topRange ? fn(MAPPING_COLORS[topRange.colorIdx]) : 'transparent';
    const isActiveSuggestion = isSuggestOnly && active; // suggestion AND currently selected
    const bg = hasError
      ? 'color-mix(in oklch, var(--danger) 20%, transparent)'
      : hasConfirmed
        ? (theme === 'dark' ? safeColor(c => c.dark) : safeColor(c => c.bg))
        : isActiveSuggestion
          ? safeColor(c => theme === 'dark' ? c.dark : c.bg)
          : (isSuggestOnly ? safeColor(c => `color-mix(in oklch, ${c.border} 12%, transparent)`) : 'transparent');
    const txtColor = !hasError && hasConfirmed && theme !== 'dark' ? safeColor(c => c.text) : undefined;
    const errorBorder = hasError ? '2px solid var(--danger)' : undefined;

    const borderBottom = errorBorder
      || (isSuggestOnly && topRange
        ? isActiveSuggestion
          ? `2.5px solid ${MAPPING_COLORS[topRange.colorIdx].border}`
          : `1.5px dashed ${MAPPING_COLORS[topRange.colorIdx].border}`
        : undefined);

    return React.createElement('span', {
      key: i,
      className: `hl-segment ${seg.ranges.length > 0 ? 'has-bg' : ''} ${active ? 'active-link' : ''} ${isSuggestOnly ? 'suggested' : ''} ${isActiveSuggestion ? 'active-suggestion' : ''} ${hasError ? 'error-span' : ''}`,
      'data-seg-start': seg.start, 'data-seg-end': seg.end,
      'data-mapping-id': (seg.ranges.length > 0 && topRange) ? topRange.id : undefined,
      style: { backgroundColor: bg, color: txtColor, borderBottom },
    },
    seg.text,

// ─── Similarity engine v2 ────────────────────────────────────────────────────
// Strategy:
//  1. Split paragraphs into sentences
//  2. For each answer sentence, find the best-matching source sentence(s)
//  3. Score = weighted combination of:
//     - word Jaccard (space-split tokens, Korean-aware)
//     - character bigram + trigram Jaccard
//     - key phrase hits (2-3 consecutive word sequences)
//  4. Merge adjacent high-scoring sentences into a single span
//  5. Confidence = raw score (no artificial inflation)

// ── Tokenisers ────────────────────────────────────────────────────────────────
function splitSentences(text) {
  // Split on Korean/Chinese sentence-end punctuation or double-newline
  return text
    .split(/(?<=[。.!?！？\n])\s*/)
    .map(s => s.trim())
    .filter(s => s.length > 4);
}

function getWords(text) {
  return text
    .replace(/[^\uAC00-\uD7A3a-zA-Z0-9\s]/g, ' ')  // keep Korean + alphanumeric
    .trim().split(/\s+/).filter(Boolean);
}

function getNgrams(text, n) {
  const set = new Set();
  for (let i = 0; i <= text.length - n; i++) set.add(text.slice(i, i + n));
  return set;
}

function getPhrases(words, maxLen = 3) {
  const set = new Set();
  for (let len = 2; len <= maxLen; len++) {
    for (let i = 0; i <= words.length - len; i++) {
      set.add(words.slice(i, i + len).join(' '));
    }
  }
  return set;
}

function jaccardSets(a, b) {
  if (!a.size || !b.size) return 0;
  let inter = 0;
  a.forEach(t => { if (b.has(t)) inter++; });
  return inter / (a.size + b.size - inter);
}

// Composite score between two strings
function similarity(src, tgt) {
  if (!src || !tgt) return 0;
  const sw = new Set(getWords(src)), tw = new Set(getWords(tgt));
  const sb2 = getNgrams(src, 2),    tb2 = getNgrams(tgt, 2);
  const sb3 = getNgrams(src, 3),    tb3 = getNgrams(tgt, 3);
  const sp  = getPhrases(getWords(src)), tp = getPhrases(getWords(tgt));

  const wScore  = jaccardSets(sw,  tw);   // word overlap
  const b2Score = jaccardSets(sb2, tb2);  // char bigram
  const b3Score = jaccardSets(sb3, tb3);  // char trigram
  const phScore = jaccardSets(sp,  tp);   // phrase overlap

  // Weighted average — phrases matter most for Korean QA
  return wScore * 0.25 + b2Score * 0.20 + b3Score * 0.20 + phScore * 0.35;
}

// ── Main matching function ─────────────────────────────────────────────────────
// Returns suggestions[]  — each covers source span(s) and answer span(s)
function buildSuggestions(paragraphs, qa) {
  if (!paragraphs?.length || !qa?.answer) return [];

  // Score each source sentence against the full answer and each answer sentence
  const ansSentences = splitSentences(qa.answer);
  const fullAnswer   = qa.answer;
  const fullQuestion = qa.question;

  // Build a flat list of { pIdx, sIdx, text, start, end } for every source sentence
  const sourceSents = [];
  paragraphs.forEach((para, pIdx) => {
    const sents = splitSentences(para);
    let cursor = 0;
    sents.forEach((sent, sIdx) => {
      const start = para.indexOf(sent, cursor);
      if (start === -1) return;
      const end = start + sent.length;
      sourceSents.push({ pIdx, sIdx, text: sent, start, end });
      cursor = end;
    });
  });

  if (!sourceSents.length) return [];

  // ── Score each source sentence ─────────────────────────────────────────────
  const scored = sourceSents.map(ss => {
    // Compare against full answer (best signal)
    const vsAnswer   = similarity(ss.text, fullAnswer);
    // Also compare against individual answer sentences → take max
    const vsAnsSents = ansSentences.map(as => similarity(ss.text, as));
    const maxVsAns   = vsAnsSents.length ? Math.max(...vsAnsSents) : 0;
    // Light signal from question (context)
    const vsQuestion = similarity(ss.text, fullQuestion) * 0.4;

    const score = Math.max(vsAnswer, maxVsAns) * 0.85 + vsQuestion * 0.15;
    return { ...ss, score };
  });

  // Sort desc
  scored.sort((a, b) => b.score - a.score);

  const MIN_SCORE = 0.06;
  const topSents  = scored.filter(s => s.score >= MIN_SCORE).slice(0, 6);
  if (!topSents.length) return [];

  // ── Group adjacent top sentences per paragraph into spans ─────────────────
  // Group by paragraph, merge contiguous
  const byPara = {};
  topSents.forEach(s => {
    if (!byPara[s.pIdx]) byPara[s.pIdx] = [];
    byPara[s.pIdx].push(s);
  });

  const spans = []; // { pIdx, start, end, score }
  Object.entries(byPara).forEach(([pIdxStr, sents]) => {
    const pIdx = Number(pIdxStr);
    sents.sort((a, b) => a.start - b.start);
    // Merge sentences that are ≤ 15 chars apart
    let cur = { ...sents[0] };
    for (let i = 1; i < sents.length; i++) {
      const s = sents[i];
      if (s.start - cur.end <= 15) {
        cur.end   = Math.max(cur.end, s.end);
        cur.score = Math.max(cur.score, s.score);
      } else {
        spans.push({ pIdx, start: cur.start, end: cur.end, score: cur.score });
        cur = { ...s };
      }
    }
    spans.push({ pIdx, start: cur.start, end: cur.end, score: cur.score });
  });

  spans.sort((a, b) => b.score - a.score);

  // ── Match answer spans ─────────────────────────────────────────────────────
  // For each source span, find the answer substring most similar to it
  const ansWords   = getWords(fullAnswer);
  const ansSugs    = [];

  // Slide a window over answer words to find best-matching phrase
  const findAnswerSpan = (srcText) => {
    let best = { start: 0, end: fullAnswer.length, score: 0 };
    // Try each answer sentence first
    let cursor = 0;
    for (const as of ansSentences) {
      const idx = fullAnswer.indexOf(as, cursor);
      if (idx === -1) continue;
      const sc = similarity(srcText, as);
      if (sc > best.score) best = { start: idx, end: idx + as.length, score: sc };
      cursor = idx + as.length;
    }
    // Fallback: whole answer
    if (best.score < 0.05) best = { start: 0, end: fullAnswer.length, score: 0.05 };
    return { start: best.start, end: best.end };
  };

  // Take top 2 non-overlapping source spans
  // Use colors starting from index 4 (yellow, teal) to stay visually distinct from confirmed mappings (orange/green/blue/purple)
  const SG_COLORS = [4, 5, 3]; // yellow, teal, purple
  const usedPara = new Set();
  for (const sp of spans.slice(0, 4)) {
    if (ansSugs.length >= SG_COLORS.length) break;
    if (usedPara.has(sp.pIdx)) continue;
    usedPara.add(sp.pIdx);

    const srcText  = paragraphs[sp.pIdx]?.slice(sp.start, sp.end) || '';
    const ansSpan  = findAnswerSpan(srcText);
    const confidence = Math.round(Math.min(sp.score * 2.2, 0.97) * 100) / 100;

    ansSugs.push({
      id:         `auto-${sp.pIdx}-${sp.start}`,
      confidence,
      colorIdx:   SG_COLORS[ansSugs.length],  // distinct color per suggestion
      source:     [{ paragraphIdx: sp.pIdx, start: sp.start, end: sp.end }],
      answer:     [ansSpan],
    });
  }

  return ansSugs;
}

// ─── Wikipedia fetch helper ───────────────────────────────────────────────────
// Extracts the article title from any ko.wikipedia.org URL,
// then calls the public MediaWiki API (CORS-enabled via origin=*).
// Returns an array of paragraph strings, or throws on failure.
async function fetchWikipediaText(wikiUrl) {
  // Normalise: strip protocol, get path after /wiki/
  const match = wikiUrl.match(/\/wiki\/([^?#]+)/);
  if (!match) throw new Error('위키백과 URL 형식이 올바르지 않습니다');
  const titleEncoded = match[1]; // already percent-encoded

  // Determine language subdomain (default ko)
  const langMatch = wikiUrl.match(/https?:\/\/([a-z-]+)\.wikipedia/);
  const lang = langMatch ? langMatch[1] : 'ko';

  const apiUrl = `https://${lang}.wikipedia.org/w/api.php?` + new URLSearchParams({
    action: 'query',
    prop: 'extracts',
    explaintext: 'true',
    exsectionformat: 'plain',
    titles: decodeURIComponent(titleEncoded),
    format: 'json',
    origin: '*',   // <-- required for browser CORS
  });

  const res = await fetch(apiUrl);
  if (!res.ok) throw new Error(`Wikipedia API 오류: HTTP ${res.status}`);
  const data = await res.json();

  const pages = data.query?.pages || {};
  const page = Object.values(pages)[0];
  if (!page || page.missing !== undefined) throw new Error('해당 문서를 찾을 수 없습니다');

  const raw = page.extract || '';
  // Split into paragraphs: double newlines or section headers (== … ==)
  const paragraphs = raw
    .split(/\n{2,}/)
    .map(p => p.replace(/^=+[^=]+=+\n?/gm, '').trim())  // strip section headers
    .filter(p => p.length > 10);                          // drop tiny fragments

  if (!paragraphs.length) throw new Error('본문 텍스트를 추출할 수 없습니다');
  return paragraphs;
}

// ─── SourcePane ───────────────────────────────────────────────────────────────
function SourcePane({ task, mappings, suggestions, showSuggestions, activeMappingId, onSelect, onClickHighlight, theme, onUpdateSourceText }) {
  const [search, setSearch] = useState('');
  // fetch state: 'idle' | 'loading' | 'done' | 'error'
  const [fetchState, setFetchState] = useState('idle');
  const [fetchError, setFetchError] = useState('');

  const sourceUrl = task.source?.url || '';
  const fullUrl = sourceUrl.startsWith('http') ? sourceUrl : (sourceUrl ? `https://${sourceUrl}` : '');

  const hasText = task.source?.paragraphs?.length > 0 &&
    !task.source.paragraphs[0]?.startsWith('※');

  // Auto-fetch when task changes and no text yet
  useEffect(() => {
    if (hasText || !fullUrl) return;
    setFetchState('loading');
    setFetchError('');
    fetchWikipediaText(fullUrl)
      .then(paragraphs => {
        onUpdateSourceText && onUpdateSourceText(paragraphs);
        setFetchState('done');
      })
      .catch(e => {
        setFetchError(e.message);
        setFetchState('error');
      });
  }, [task.id, fullUrl]); // re-run when task changes

  const retryFetch = () => {
    if (!fullUrl) return;
    setFetchState('loading');
    setFetchError('');
