// ─── SetupScreen ──────────────────────────────────────────────────────────────
function SetupScreen({ onStart }) {
  const [workerId, setWorkerId] = useState('');
  const [tasks, setTasks] = useState(null);
  const [fileName, setFileName] = useState('');
  const [parseErrors, setParseErrors] = useState([]);
  const [folderHandle, setFolderHandle] = useState(null);
  const [loading, setLoading] = useState(false);
  const [restoreMsg, setRestoreMsg] = useState('');

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const { tasks: parsed, errors } = parseJsonl(text);
    setTasks(parsed);
    setFileName(file.name);
    setParseErrors(errors);
  };

  const handlePickFolder = async () => {
    const handle = await pickOutputFolder();
    if (handle) setFolderHandle(handle);
  };

  const canStart = workerId.trim().length >= 1 && tasks && tasks.length > 0 && folderHandle;

  const handleStart = () => {
    if (!canStart) return;
    onStart({ workerId: workerId.trim(), tasks, folderHandle });
  };

  const handleRestoreAndStart = async () => {
    if (!canStart) return;
    // restoredData: Map<taskId, savedFileData> — 저장된 파일 전체 내용
    const restoredData = new Map();
    let restoreMsg = '';
    try {
      // Step 1: localStorage에서 완료된 task ID 목록 읽기
      const key = `qa_review_index_${(folderHandle?.name || 'default').replace(/[^a-zA-Z0-9가-힣_-]/g, '_')}`;
      const raw = localStorage.getItem(key);
      const completedItems = raw ? (JSON.parse(raw).completed || []) : [];

      // Step 2: 각 완료 항목의 저장 파일을 읽어서 전체 데이터 복원
      const wid = workerId.trim().replace(/[^a-zA-Z0-9가-힣_-]/g, '_');
      await Promise.all(completedItems.map(async (item) => {
        const taskId = typeof item === 'string' ? item : item?.id;
        if (!taskId) return;
        try {
          const safeTask = taskId.replace(/[^a-zA-Z0-9_-]/g, '_');
          const fh2 = await folderHandle.getFileHandle(`${wid}_${safeTask}.json`, { create: false });
          const file = await fh2.getFile();
          const data = JSON.parse(await file.text());
          restoredData.set(taskId, data);
        } catch {
          // 파일이 없으면 verdict만 복원
          const verdict = typeof item === 'string' ? 'pass' : (item?.verdict || 'pass');
          restoredData.set(taskId, { _review: { verdict } });
        }
      }));

      const matchCount = restoredData.size;
      restoreMsg = matchCount > 0
        ? `✓ 이전 이력 ${matchCount}개 항목 복원됨`
        : '저장된 이력이 없습니다. 새로 시작합니다.';
    } catch (e) {
      restoreMsg = '복원 오류: ' + e.message;
    }
    setRestoreMsg(restoreMsg);
    onStart({ workerId: workerId.trim(), tasks, folderHandle, restoredData });
  };

  return React.createElement('div', { className: 'setup-screen' },
    React.createElement('div', { className: 'setup-card' },
      // Logo row
      React.createElement('div', { className: 'setup-logo-row' },
        React.createElement('div', { className: 'setup-logo' }, '독'),
        React.createElement('div', { className: 'setup-brand' },
          React.createElement('strong', null, '독파모2차 · 지식 QA 검수 툴'),
          React.createElement('small', null, '세션을 시작하기 전에 아래 항목을 설정해주세요')
        )
      ),
      React.createElement('div', { className: 'setup-divider' }),

      // Step 1: Worker ID
      React.createElement('div', { className: 'setup-section' },
        React.createElement('div', { className: 'setup-section-title' }, '① 작업자 정보'),
        React.createElement('div', { className: 'setup-field' },
          React.createElement('label', null, '작업자 ID'),
          React.createElement('input', {
            className: 'setup-input',
            placeholder: '예: worker_01  또는  김철수',
            value: workerId,
            onChange: e => setWorkerId(e.target.value),
            onKeyDown: e => { if (e.key === 'Enter' && canStart) handleStart(); },
            autoFocus: true,
          })
        )
      ),

      // Step 2: JSONL file
      React.createElement('div', { className: 'setup-section' },
        React.createElement('div', { className: 'setup-section-title' }, '② 작업 데이터 (.jsonl)'),
        React.createElement('label', { style: { cursor: 'pointer' } },
          React.createElement('input', { type: 'file', accept: '.jsonl,.json', onChange: handleFile, style: { display: 'none' } }),
          React.createElement('div', { className: `setup-file-btn ${tasks ? 'selected' : ''}` },
            tasks
              ? React.createElement(Icon, { name: 'check', size: 16 })
              : React.createElement(Icon, { name: 'arrowRight', size: 16 }),
            React.createElement('span', { className: 'setup-file-name' },
              fileName || 'JSONL 파일 선택…'
            ),
            tasks && React.createElement('span', { className: 'setup-file-count' },
              `${tasks.length}개 항목`
            )
          )
        ),
        parseErrors.length > 0 && React.createElement('div', { className: 'setup-error' },
          `⚠ ${parseErrors.length}개 라인 파싱 오류 (나머지 ${tasks?.length || 0}개는 정상 로드됨): `,
          `라인 ${parseErrors.slice(0, 3).map(e => e.line).join(', ')}${parseErrors.length > 3 ? ' …' : ''}`
        )
      ),

      // Step 3: Output folder
      React.createElement('div', { className: 'setup-section' },
        React.createElement('div', { className: 'setup-section-title' }, '③ 결과 저장 폴더'),
        React.createElement('button', {
          className: `setup-folder-btn ${folderHandle ? 'selected' : ''}`,
          onClick: handlePickFolder,
        },
          svgFolder(16),
          folderHandle
            ? React.createElement(React.Fragment, null,
                React.createElement('strong', null, folderHandle.name),
                React.createElement('span', { style: { marginLeft: 'auto', fontSize: 11, opacity: 0.7 } }, '폴더 변경')
              )
            : '폴더 선택…  (제출 시 JSON 파일이 이 폴더에 저장됩니다)'
        ),
        React.createElement('p', { style: { fontSize: 11, color: 'var(--text-faint)', margin: 0 } },
          '파일명 형식: ',
          React.createElement('code', { style: { fontFamily: 'var(--font-mono)' } },
            '{작업자ID}_{taskID}.json'
          ),
          ' — 같은 폴더·작업자ID로 이어하기 가능'
        )
      ),

      // Start button
      React.createElement('button', {
        className: 'setup-start-btn',
        disabled: !canStart,
        onClick: handleStart,
      }, canStart ? '새로 시작 →' : '위 항목을 모두 입력해주세요'),
      canStart && React.createElement('button', {
        style: { height: 38, borderRadius: 9, border: '1px solid var(--border)', background: 'var(--bg-sunken)', color: 'var(--text-dim)', fontFamily: 'inherit', fontSize: 13, fontWeight: 500, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 },
        onClick: handleRestoreAndStart,
        title: '저장 폴더에서 완료된 작업 이력을 불러와 이어서 진행합니다',
      },
        '↩ 이전 작업 이어하기'
      ),
      restoreMsg && React.createElement('p', {
        style: { fontSize: 12, color: restoreMsg.includes('없음') || restoreMsg.includes('없습니다') ? 'var(--text-faint)' : 'var(--success)', margin: 0, textAlign: 'center' }
      }, restoreMsg)
    )
  );
}

// ─── Workspace (all hooks at top level, no conditional returns before hooks) ──
function Workspace({ initTasks, workerId, initFolderHandle }) {
  const [tasks, setTasks_internal] = useState(initTasks);
  const setTasks = (updater) => {
    setTasks_internal(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      tasksRef.current = next;
      return next;
    });
  };
  const [folderHandle, setFolderHandle] = useState(initFolderHandle);
  const [currentId, setCurrentId] = useState(initTasks[0]?.id || null);
  const [dark, setDark] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [showSuggestions, setShowSuggestions] = useState(true);
  const [activeMappingId, setActiveMappingId] = useState(null);
  const [toast, setToast] = useState(null);
  const [nextColorIdx, setNextColorIdx] = useState(0);
  // Undo stack: array of mappings snapshots per task { taskId, mappings }
  const mappingHistoryRef = React.useRef([]);
  const tasksRef = React.useRef(initTasks);
  // Error-span drag mode (activated when verdict === 'fail')
  const [errorSpanMode, setErrorSpanMode] = useState(false);
  // 비식별화 진단 on/off + 모달 표시
  const [deidEnabled, setDeidEnabled] = useState(true);
  const [showDeidModal, setShowDeidModal] = useState(false);
  // 비식별화 결과 대기 중인 제출 콜백
  const pendingSubmitRef = React.useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  }, [dark]);

  // 세션 시작 시 첫 번째 항목 assignedAt 찍기 (클릭 없이 자동 진입되는 경우)
  useEffect(() => {
    if (!currentId) return;
    setTasks(prev => prev.map(t =>
      t.id === currentId && !t.assignedAt && t.status !== 'completed'
        ? { ...t, assignedAt: new Date().toISOString() }
        : t
    ));
  }, []); // mount 시 1회만

  // showToast declared first — many callbacks depend on it
  const showToast = useCallback((message, sub) => {
    setToast({ message, sub });
    setTimeout(() => setToast(null), 3500);
  }, []);

  // ── derived ───────────────────────────────────────────────────────────────
  const currentTask = tasks.find(t => t.id === currentId) || null;
  const mappings    = currentTask?.mappings    || [];
  const suggestions = currentTask?.suggestions || [];
  const review      = currentTask?.review      || {};

  // ── updaters ──────────────────────────────────────────────────────────────
  const updateCurrent  = useCallback((patch) =>
    setTasks(prev => prev.map(t => t.id === currentId ? { ...t, ...patch } : t)),
    [currentId]);

  const updateMappings = useCallback((fn) =>
    setTasks(prev => prev.map(t => t.id === currentId ? { ...t, mappings: fn(t.mappings || []) } : t)),
    [currentId]);

  const updateSuggestions = useCallback((fn) =>
    setTasks(prev => prev.map(t => t.id === currentId ? { ...t, suggestions: fn(t.suggestions || []) } : t)),
    [currentId]);

  const updateQA = useCallback((patch) =>
    setTasks(prev => prev.map(t => t.id === currentId ? { ...t, qa: { ...t.qa, ...patch } } : t)),
    [currentId]);

  const onChangeCategory = useCallback((cat) => updateQA({ category: cat }), [updateQA]);

  // ── mapping actions ───────────────────────────────────────────────────────
  const onAcceptSuggestion = useCallback((sid) => {
    setTasks(prev => {
      const task = prev.find(t => t.id === currentId);
      if (!task) return prev;
      const sug = (task.suggestions || []).find(s => s.id === sid);
      if (!sug) return prev;
      const id = `m-${Date.now()}`;
      const colorIdx = nextColorIdx % MAPPING_COLORS.length;
      return prev.map(t => t.id === currentId ? {
        ...t,
        mappings: [...(t.mappings || []), { id, colorIdx, source: sug.source || [], answer: sug.answer || [], fromSuggestion: sid }],
        suggestions: (t.suggestions || []).filter(s => s.id !== sid),
      } : t);
    });
    setNextColorIdx(n => n + 1);
  }, [currentId, nextColorIdx]);

  const onRejectSuggestion = useCallback((sid) =>
    updateSuggestions(ss => ss.filter(s => s.id !== sid)), [updateSuggestions]);

  const createNewMapping = useCallback(() => {
    const id = `m-${Date.now()}`;
    const colorIdx = nextColorIdx % MAPPING_COLORS.length;
    setNextColorIdx(n => n + 1);
    updateMappings(ms => [...ms, { id, colorIdx, source: [], answer: [] }]);
    setActiveMappingId(id);
  }, [nextColorIdx, updateMappings]);

  const ensureActiveMapping = useCallback(() => {
    // Check if current activeMappingId still exists in tasks (read via ref pattern)
    let existingId = null;
    setTasks(prev => {
      const task = prev.find(t => t.id === currentId);
      if (activeMappingId && (task?.mappings || []).some(m => m.id === activeMappingId)) {
        existingId = activeMappingId;
      }
      return prev;
    });
    if (existingId) return existingId;

    const id = `m-${Date.now()}`;
    const colorIdx = nextColorIdx % MAPPING_COLORS.length;
    setNextColorIdx(n => n + 1);
    updateMappings(ms => [...ms, { id, colorIdx, source: [], answer: [] }]);
    setActiveMappingId(id);
    return id;
  }, [activeMappingId, currentId, nextColorIdx, updateMappings]);

  const onSelectSource = useCallback(({ paragraphIdx, start, end }) => {
    pushMappingHistory();
    setTasks(prev => {
      const task = prev.find(t => t.id === currentId);
      if (!task) return prev;
      const curMappings = task.mappings || [];
      let targetId = activeMappingId && curMappings.some(m => m.id === activeMappingId)
        ? activeMappingId : null;
      if (!targetId) {
        targetId = `m-${Date.now()}`;
        const colorIdx = nextColorIdx % MAPPING_COLORS.length;
        setNextColorIdx(n => n + 1);
        setActiveMappingId(targetId);
        return prev.map(t => t.id === currentId ? {
          ...t, mappings: [...curMappings, { id: targetId, colorIdx, source: [{ paragraphIdx, start, end }], answer: [] }]
        } : t);
      }
      return prev.map(t => t.id === currentId ? {
        ...t, mappings: curMappings.map(m => m.id === targetId
          ? { ...m, source: [...(m.source || []), { paragraphIdx, start, end }] } : m)
      } : t);
    });
    window.getSelection()?.removeAllRanges();
  }, [activeMappingId, currentId, nextColorIdx]);

  const onSelectAnswer = useCallback(({ start, end }) => {
    pushMappingHistory();
    setTasks(prev => {
      const task = prev.find(t => t.id === currentId);
      if (!task) return prev;
      const curMappings = task.mappings || [];
      let targetId = activeMappingId && curMappings.some(m => m.id === activeMappingId)
        ? activeMappingId : null;
      if (!targetId) {
        targetId = `m-${Date.now()}`;
        const colorIdx = nextColorIdx % MAPPING_COLORS.length;
        setNextColorIdx(n => n + 1);
        setActiveMappingId(targetId);
        return prev.map(t => t.id === currentId ? {
          ...t, mappings: [...curMappings, { id: targetId, colorIdx, source: [], answer: [{ start, end }] }]
        } : t);
      }
      return prev.map(t => t.id === currentId ? {
        ...t, mappings: curMappings.map(m => m.id === targetId
          ? { ...m, answer: [...(m.answer || []), { start, end }] } : m)
      } : t);
    });
    window.getSelection()?.removeAllRanges();
  }, [activeMappingId, currentId, nextColorIdx]);

  const onClickHighlight = useCallback((mappingId) =>
    setActiveMappingId(prev => prev === mappingId ? null : mappingId), []);

  const onDeleteMapping = useCallback((id) => {
    pushMappingHistory();
    updateMappings(ms => ms.filter(m => m.id !== id));
    setActiveMappingId(prev => prev === id ? null : prev);
  }, [updateMappings]);

  // ── Undo (Ctrl+Z) for mappings ────────────────────────────────────────────
  const pushMappingHistory = useCallback(() => {
    setTasks(prev => {
      const task = prev.find(t => t.id === currentId);
      if (!task) return prev;
      const hist = mappingHistoryRef.current;
      hist.push({ taskId: currentId, mappings: JSON.parse(JSON.stringify(task.mappings || [])) });
      if (hist.length > 50) hist.shift(); // cap stack
      return prev;
    });
  }, [currentId]);

  const undoMapping = useCallback(() => {
    const hist = mappingHistoryRef.current;
    // pop until we find an entry for currentId
    while (hist.length > 0 && hist[hist.length - 1].taskId !== currentId) hist.pop();
    if (!hist.length) return;
    const prev_state = hist.pop();
    setTasks(prev => prev.map(t =>
      t.id === currentId ? { ...t, mappings: prev_state.mappings } : t
    ));
    showToast('↩ 매핑 실행 취소', '');
  }, [currentId, showToast]);

  // ── Flag toggle ────────────────────────────────────────────────────────────
  const toggleFlag = useCallback(() => {
    // Read current flagged state directly from tasks, then toggle
    setTasks(prev => prev.map(t =>
      t.id === currentId ? { ...t, flagged: !t.flagged } : t
    ));
  }, [currentId]);

  // ── Error span (fail mode drag on Answer) ────────────────────────────────
  const onSelectErrorSpan = useCallback(({ start, end }) => {
    setTasks(prev => prev.map(t => {
      if (t.id !== currentId) return t;
      const existing = t.review?.errorSpans || [];
      return { ...t, review: { ...(t.review || {}), errorSpans: [...existing, { start, end }] } };
    }));
    window.getSelection()?.removeAllRanges();
  }, [currentId]);

  const clearErrorSpans = useCallback(() => {
    setTasks(prev => prev.map(t =>
      t.id === currentId ? { ...t, review: { ...(t.review || {}), errorSpans: [] } } : t
    ));
  }, [currentId]);

  // ── Completion check: {workerId}_{taskId}.json 파일 존재 여부로 복원 판단 ─────
  // 파일명이 고정이므로 getFileHandle로 직접 조회 가능 (file:// 에서도 동작)
  const checkTaskCompleted = useCallback(async (fh, wid, taskId) => {
    try {
      const safeWorker = wid.replace(/[^a-zA-Z0-9가-힣_-]/g, '_');
      const safeTask   = taskId.replace(/[^a-zA-Z0-9_-]/g, '_');
      await fh.getFileHandle(`${safeWorker}_${safeTask}.json`, { create: false });
      return true;
    } catch { return false; }
  }, []);

  const onChangeReview = useCallback((rev) => {
    if (rev.status === 'fail') setErrorSpanMode(true);
    else setErrorSpanMode(false);
    // 수정완료 선택 시 오류유형=기타, 사유=[카테고리 수정] 자동 입력 (비어있을 때만)
    let finalRev = rev;
    if (rev.status === 'modified' && !rev.category && !rev.reason) {
      finalRev = { ...rev, category: 'other', reason: '[카테고리 수정]' };
    }
    updateCurrent({ review: finalRev });
  }, [updateCurrent]);

  // Stamp assignedAt when a task is first activated (not at load time)
  const activateTask = useCallback((id) => {
    setTasks(prev => prev.map(t =>
      t.id === id && !t.assignedAt && t.status !== 'completed'
        ? { ...t, assignedAt: new Date().toISOString() }
        : t
    ));
    setCurrentId(id);
    setActiveMappingId(null);
    setErrorSpanMode(false);
  }, []);

  const navigateTask = useCallback((dir) => {
    setTasks(prev => {
      const idx = prev.findIndex(t => t.id === currentId);
      const next = dir === 'next' ? prev[idx + 1] : prev[idx - 1];
      if (next) activateTask(next.id);
      return prev;
    });
  }, [currentId, activateTask]);

  const handlePickFolder = useCallback(async () => {
    const handle = await pickOutputFolder();
    if (handle) setFolderHandle(handle);
  }, []);

  // 실제 저장 실행 함수 (비식별화 결과 포함)
  const doSubmit = useCallback(async (deidResult, failReview) => {
    if (!folderHandle) {
      showToast('⚠ 저장 폴더가 지정되지 않았습니다', '상단 "저장 폴더 지정" 버튼을 눌러 폴더를 선택해주세요');
      return;
    }
    // snapshot — tasksRef로 동기 읽기 (setTasks 배치 타이밍 문제 없음)
    const snapshot = tasksRef.current.find(t => t.id === currentId);
    if (!snapshot) return;
    // failReview: 비식별화로 인해 불통 처리 시 review를 직접 주입 (무한루프 방지)
    const snapReview    = failReview || snapshot.review || {};
    const snapMappings  = snapshot.mappings || [];

    const payload  = buildResultPayload({ task: snapshot, workerId, review: snapReview, mappings: snapMappings });
    const finalDeid = deidResult || snapshot._deidResult || null;
    if (finalDeid) payload._review.deidentification = finalDeid;
    const filename = buildOutputFilename(workerId, snapshot.id);

    try {
      console.log('[QA Tool] saving file:', filename, 'to folder:', folderHandle?.name);
      await saveResultFile(folderHandle, filename, payload);
      console.log('[QA Tool] save SUCCESS');
      // localStorage에 완료 이력 저장
      const lsKey = `qa_review_index_${(folderHandle?.name || 'default').replace(/[^a-zA-Z0-9가-힣_-]/g, '_')}`;
      try {
        const existing = JSON.parse(localStorage.getItem(lsKey) || '{"completed":[]}');
        // 이미 있는 항목은 verdict 업데이트, 없으면 추가
        const idx2 = existing.completed.findIndex(item =>
          typeof item === 'string' ? item === snapshot.id : item?.id === snapshot.id
        );
        const entry = { id: snapshot.id, verdict: snapReview.status };
        if (idx2 >= 0) existing.completed[idx2] = entry;
        else existing.completed.push(entry);
        localStorage.setItem(lsKey, JSON.stringify(existing));
      } catch(e) { console.warn('[QA Tool] localStorage write failed:', e); }
      setTasks(prev => prev.map(t => {
        if (t.id !== currentId) return t;
        // _firstLog: 최초 제출 시각 보존 — 재제출해도 덮어쓰지 않음
        const firstLog = t._firstLog || {
          assigned_at:     payload._review.assigned_at,
          submitted_at:    payload._review.submitted_at,
          elapsed_seconds: payload._review.elapsed_seconds,
        };
        return { ...t, status: 'completed', _elapsedSeconds: payload._review?.elapsed_seconds, _firstLog: firstLog };
      }));
      const labels = { pass: '통과', fail: '불통', modified: '수정완료', hold: '보류' };
      showToast(`✓ 제출 완료: ${labels[snapReview.status]}`, `저장: ${filename}`);

      // auto-advance to next pending
      // setTasks 콜백 밖에서 activateTask 호출해야 타이밍 꼬임 방지
      setTimeout(() => {
        const cur = currentId;
        const tasks_snap = tasksRef.current;
        const idx = tasks_snap.findIndex(t => t.id === cur);
        const next = tasks_snap.slice(idx + 1).find(t => t.status === 'pending');
        if (next) activateTask(next.id);
      }, 500);
    } catch (e) {
      showToast('⚠ 저장 실패', e.message);
    }
  }, [folderHandle, currentId, workerId, showToast, activateTask]);

  // 비식별화 게이트 — deidEnabled이면 모달 먼저, 아니면 바로 제출
  const onSubmit = useCallback(() => {
    if (deidEnabled && review?.status !== 'fail') {
      // fail 판정은 이미 비식별화 진단을 거쳤거나 직접 선택한 것이므로 건너뜀
      setShowDeidModal(true);
    } else {
      doSubmit(null, null);
    }
  }, [deidEnabled, review?.status, doSubmit]);

  const handleDeidConfirm = useCallback((deidResult, needsFail) => {
    setShowDeidModal(false);
    if (needsFail) {
      // 불통 권고: status=fail, 오류유형=기타, 사유=[비식별화 필요] 자동 입력
      setTasks(prev => prev.map(t =>
        t.id === currentId
          ? { ...t,
              _deidResult: deidResult,
              review: { ...(t.review || {}), status: 'fail', category: 'other', reason: '[비식별화 필요]' }
            }
          : t
      ));
    } else {
      // 문제 없음: 바로 제출
      doSubmit(deidResult, null);
    }
  }, [currentId, doSubmit]);

  const handleDeidCancel = useCallback(() => setShowDeidModal(false), []);

  // ── keyboard shortcuts ────────────────────────────────────────────────────
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
      if (e.key === 'Escape') { setActiveMappingId(null); setShowShortcuts(false); return; }
      if (e.key === '?') { setShowShortcuts(true); return; }
      if (e.key === 'n' || e.key === 'N') { createNewMapping(); e.preventDefault(); return; }
      if (e.key === 'j' || e.key === 'J') { navigateTask('prev'); return; }
      if (e.key === 'k' || e.key === 'K') { navigateTask('next'); return; }
      if (e.key === '1') { setTasks(prev => { const t = prev.find(x => x.id === currentId); if (t) return prev.map(x => x.id === currentId ? { ...x, review: { ...(x.review||{}), status: 'pass' } } : x); return prev; }); return; }
      if (e.key === '2') { setTasks(prev => prev.map(x => x.id === currentId ? { ...x, review: { ...(x.review||{}), status: 'fail' } } : x)); return; }
      if (e.key === '3') { setTasks(prev => prev.map(x => x.id === currentId ? { ...x, review: { ...(x.review||{}), status: 'modified' } } : x)); return; }
      if (e.key === '4') { setTasks(prev => prev.map(x => x.id === currentId ? { ...x, review: { ...(x.review||{}), status: 'hold' } } : x)); return; }
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { onSubmit(); e.preventDefault(); }
      if ((e.key === 'z' || e.key === 'Z') && (e.metaKey || e.ctrlKey) && !e.shiftKey) { undoMapping(); e.preventDefault(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [createNewMapping, navigateTask, onSubmit, undoMapping, currentId]);

    const onUpdateSourceText = useCallback((paragraphs) => {
    setTasks(prev => prev.map(t => {
      if (t.id !== currentId) return t;
      // Build similarity suggestions from the freshly loaded paragraphs
      const autoSuggestions = buildSuggestions(paragraphs, t.qa);
      return {
        ...t,
        source: { ...t.source, paragraphs },
        // Only inject auto-suggestions if there are none yet (don't overwrite manual ones)
        suggestions: (t.suggestions || []).length === 0 ? autoSuggestions : t.suggestions,
      };
    }));
  }, [currentId]);

  // ── render ────────────────────────────────────────────────────────────────
  if (!currentTask) {
    return React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text-faint)', fontSize: 15 } },
      '작업 항목이 없습니다.');
  }

  const articleTasks    = tasks.filter(t => t.articleId === currentTask.articleId);
  const qIdxInArticle   = articleTasks.findIndex(t => t.id === currentId);
  const activeMapping   = mappings.find(m => m.id === activeMappingId);
  const activeMappingIdx = mappings.findIndex(m => m.id === activeMappingId);
  const theme = dark ? 'dark' : 'light';

  return React.createElement(React.Fragment, null,
    React.createElement(TopBar, {
      tasks, workerId, folderHandle, onPickFolder: handlePickFolder,
      dark, onToggleDark: () => setDark(d => !d),
      onShowShortcuts: () => setShowShortcuts(true),
      deidEnabled, onToggleDeid: () => setDeidEnabled(v => !v),
    }),
    React.createElement('div', { className: 'app-body' },
      React.createElement(Sidebar, {
        tasks, currentId,
        onSelect: (id) => activateTask(id),
        collapsed: sidebarCollapsed,
        onToggleCollapse: () => setSidebarCollapsed(c => !c),
      }),
      React.createElement('main', { className: 'workspace' },
        React.createElement('div', { className: 'workspace-header' },
          React.createElement('span', { className: 'task-id' }, currentTask.id),
          React.createElement('h1', { className: 'task-title-h' }, currentTask.title),
          currentTask.category && React.createElement('span', { className: 'task-category-pill' }, currentTask.category),
          React.createElement('span', { className: 'task-category-pill', style: { color: 'var(--text-faint)' } },
            `Q${qIdxInArticle + 1} / ${articleTasks.length}`
          ),
          currentTask.source?.revision && React.createElement('span', { className: 'task-category-pill', style: { color: 'var(--text-faint)' } },
            currentTask.source.revision
          ),
          React.createElement('div', { className: 'workspace-header-actions' },
            React.createElement('button', { className: 'iconbtn', onClick: () => navigateTask('prev'), title: '이전 (K)' },
              React.createElement(Icon, { name: 'chevronLeft' })
            ),
            React.createElement('button', { className: 'iconbtn', onClick: () => navigateTask('next'), title: '다음 (J)' },
              React.createElement(Icon, { name: 'chevronRight' })
            ),
            React.createElement('span', { style: { width: 1, height: 18, background: 'var(--border)', margin: '0 4px' } }),
            React.createElement('button', {
              className: `iconbtn ${currentTask.flagged ? 'flagged' : ''}`,
              title: currentTask.flagged ? '플래그 해제' : '플래그 (작업중)',
              onClick: toggleFlag,
            }, React.createElement(Icon, { name: 'flag' })),
            React.createElement('button', { className: 'iconbtn', title: '북마크' }, React.createElement(Icon, { name: 'bookmark' }))
          )
        ),
        React.createElement('div', { className: 'dual-pane', style: { position: 'relative' } },
          showDeidModal && React.createElement(DeidentModal, {
            onConfirm: handleDeidConfirm,
            onCancel:  handleDeidCancel,
          }),
          React.createElement(SourcePane, {
            task: currentTask, mappings, suggestions, showSuggestions,
            activeMappingId, onSelect: onSelectSource, onClickHighlight, theme,
            onUpdateSourceText,
          }),
          React.createElement(QAPane, {
            task: currentTask, mappings, suggestions, showSuggestions,
            activeMappingId,
            onSelect: errorSpanMode ? onSelectErrorSpan : onSelectAnswer,
            onClickHighlight, onChangeCategory, theme,
            errorSpanMode, onClearErrorSpans: clearErrorSpans,
          }),
          activeMapping && React.createElement(MappingFloater, {
            mapping: activeMapping, mappingIdx: activeMappingIdx,
            onDone: () => setActiveMappingId(null),
          })
        ),
        React.createElement(MappingsBar, {
          mappings, suggestions, showSuggestions,
          onToggleSuggestions: () => setShowSuggestions(v => !v),
          activeMappingId, onSetActive: setActiveMappingId,
          onDelete: onDeleteMapping, onCreate: createNewMapping,
          onUndo: undoMapping,
          onAcceptSuggestion, onRejectSuggestion, theme,
        }),
        React.createElement(ReviewFooter, {
          review, onChange: onChangeReview, onSubmit,
          mappingCount: mappings.length,
          pendingSuggestions: suggestions.length,
          sourceLoaded: (currentTask.source?.paragraphs?.length > 0 && !currentTask.source.paragraphs[0]?.startsWith('※')),
          categoryChanged: currentTask.qa.category !== currentTask.qa.originalCategory,
        })
      )
    ),
    showShortcuts && React.createElement(ShortcutsModal, { onClose: () => setShowShortcuts(false) }),

    toast && React.createElement('div', { className: 'toast' },
      React.createElement(Icon, { name: 'check' }),
      React.createElement('div', null,
        React.createElement('div', null, toast.message),
        toast.sub && React.createElement('div', { style: { fontSize: 11, opacity: 0.7, marginTop: 2 } }, toast.sub)
      )
    )
  );
}

// ─── App (thin router only — no hooks before conditional) ─────────────────────
function App() {
  const [session, setSession] = useState(null);

  const startSession = ({ workerId, tasks, folderHandle, restoredData }) => {
    // restoredData: Map<taskId, savedFileData>
    const initialised = tasks.map(t => {
      const saved = restoredData?.get(t.id);
      if (!saved) {
        // 미완료 task — 초기화만
        return { ...t, assignedAt: null, mappings: t.mappings || [], review: t.review || null };
      }
      // 완료 task — 저장 파일에서 전체 복원
      const rev = saved._review || {};

      // 매핑 복원: source_spans/answer_spans → 내부 형식으로 변환
      const mappings = (rev.mappings || []).map((m, idx) => ({
        id: `restored-${t.id}-${idx}`,
        colorIdx: idx % 6,
        fromSuggestion: m.from_suggestion || null,
        source: (m.source_spans || []).map(s => ({
          paragraphIdx: s.paragraph_index, start: s.start, end: s.end,
        })),
        answer: (m.answer_spans || []).map(a => ({ start: a.start, end: a.end })),
      }));

      // 카테고리 복원
      const QA_CATS = { '역사':'history','경제/경영':'economy','건강/의학':'health','예술':'art','과학/기술':'science' };
      const restoredCatId = QA_CATS[saved.metadata?.subcategory] || t.qa.originalCategory;
      const origCatId     = QA_CATS[rev.original_subcategory] || t.qa.originalCategory;

      // 원천 텍스트는 URL에서 재fetch (저장 안 함)
      const sourceParagraphs = t.source?.paragraphs || [];

      return {
        ...t,
        assignedAt: rev.assigned_at || null,
        _elapsedSeconds: rev.elapsed_seconds || null,
        // 복원 시 _firstLog 세팅 — 재제출해도 최초 로그 보존
        _firstLog: {
          assigned_at:     rev.assigned_at || null,
          submitted_at:    rev.submitted_at || null,
          elapsed_seconds: rev.elapsed_seconds || 0,
        },
        status: 'completed',
        flagged: !!rev.flag,
        source: { ...t.source, paragraphs: sourceParagraphs },
        qa: {
          ...t.qa,
          category:         restoredCatId,
          originalCategory: origCatId,
        },
        mappings,
        suggestions: [],  // 제출 완료된 항목은 제안 불필요
        review: {
          status:      rev.verdict      || null,
          category:    rev.error_category || null,
          reason:      rev.reason       || null,
          errorSpans:  (rev.error_spans || []).map(s => ({ start: s.start, end: s.end })),
        },
      };
    });
    setSession({ workerId, tasks: initialised, folderHandle });
  };

  if (!session) {
    return React.createElement(SetupScreen, { onStart: startSession });
  }
  return React.createElement(Workspace, {
    initTasks: session.tasks,
    workerId: session.workerId,
    initFolderHandle: session.folderHandle,
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
